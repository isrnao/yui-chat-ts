# Workflow name
name: 'Chromatic'

# Event for the workflow
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# List of jobs
jobs:
  chromatic-deployment:
    # Operating System
    runs-on: ubuntu-latest
    env:
      CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
      CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      CHROMATIC_SLUG: ${{ github.repository }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    # Job steps
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required to retrieve git history
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook (with stats for TurboSnap)
        run: pnpm build-storybook

      - name: Ensure preview-stats.json exists
        run: |
          if [ -f storybook-static/storybook-stats.json ] && [ ! -f storybook-static/preview-stats.json ]; then
            mv storybook-static/storybook-stats.json storybook-static/preview-stats.json
          fi

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          # Chromatic GitHub Action options
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: exit with error code if visual changes are detected
          exitOnceUploaded: true
          # Optional: only run on main branch changes
          onlyChanged: true
          # Optional: use turbo-snap for faster builds
          storybookBuildDir: storybook-static
